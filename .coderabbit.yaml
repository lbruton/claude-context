# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit base configuration — safe for all lbruton repos.
# Copy to each repo root as .coderabbit.yaml, then add repo-specific
# path_instructions or tool overrides below the base.
#
# Profile: assertive (includes nitpick comments — good for solo dev)
# Docs: https://docs.coderabbit.ai/reference/configuration

language: 'en-US'
early_access: false

reviews:
    profile: 'assertive'

    # PR summary features
    high_level_summary: true
    review_status: true
    poem: false
    collapse_walkthrough: false

    # Workflow
    request_changes_workflow: false
    abort_on_close: true

    # Auto-review settings
    auto_review:
        enabled: true
        auto_incremental_review: true
        drafts: false
        ignore_title_keywords:
            - 'WIP'
            - 'DO NOT MERGE'
        base_branches: []

    # Global path filters — exclude noise across all repos
    path_filters:
        - '!**/node_modules/**'
        - '!**/dist/**'
        - '!**/build/**'
        - '!**/.claude/**'
        - '!**/.gemini/**'
        - '!**/.agents/**'
        - '!**/.spec-workflow/**'
        - '!**/.codacy/**'
        - '!**/vendor/**'
        - '!**/deprecated/**'
        - '!**/*.min.js'
        - '!**/*.min.css'
        - '!**/package-lock.json'
        - '!**/pnpm-lock.yaml'
        - '!**/yarn.lock'
        - '!**/screenshots/**'
        - '!**/*.png'
        - '!**/*.jpg'
        - '!**/*.svg'

    # Path-specific review instructions
    path_instructions:
        - path: '**/*.ts'
          instructions: |
              - Check for proper TypeScript strict-mode patterns (no implicit any, no non-null assertions without justification).
              - Flag missing error handling on async operations.
              - Verify imports are from correct package paths (no workspace:* leaks).
        - path: '**/*.tsx'
          instructions: |
              - Check React component patterns: proper hook dependencies, no inline object props causing re-renders.
              - Verify accessibility basics (alt text, aria labels, keyboard navigation).
        - path: '**/*.py'
          instructions: |
              - Check for proper exception handling (no bare except).
              - Verify type hints on public function signatures.
        - path: '**/Dockerfile*'
          instructions: |
              - Check for pinned base image versions (no :latest tags).
              - Verify multi-stage builds where appropriate.
              - Flag any secrets or credentials in build args.
        - path: '**/*.sql'
          instructions: |
              - Check for SQL injection risks in dynamic queries.
              - Verify migrations are reversible where possible.
        - path: 'tests/**'
          instructions: |
              - Verify meaningful assertions (not just "it runs without error").
              - Check for proper cleanup/teardown.
        - path: '**/__tests__/**'
          instructions: |
              - Verify meaningful assertions (not just "it runs without error").
              - Check for proper cleanup/teardown.

    # Finishing touches
    finishing_touches:
        docstrings:
            enabled: false

    # Static analysis tools
    tools:
        eslint:
            enabled: true
        markdownlint:
            enabled: true
        gitleaks:
            enabled: true
        actionlint:
            enabled: true
        yamllint:
            enabled: true
        opengrep:
            enabled: true

# Knowledge base — learn from feedback over time
knowledge_base:
    learnings:
        scope: 'auto'

# Chat — allow @coderabbitai interactions in PR comments
chat:
    auto_reply: true
